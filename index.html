    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="Brandable | The Ultimate AI-Powered Content & Brand OS" />
    <meta property="og:description" content="Elevate your brand with Brandable. A centralized platform for content strategy, file management, and AI-driven creativity." />
    <meta property="og:image" content="https://cdn.dribbble.com/userupload/46470256/file/af6fd035c99fbb7985614c15d3a47d96.jpg?format=webp&resize=640x480&vertical=center" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://brandable.app/" />
    <meta property="twitter:title" content="Brandable | The Ultimate AI-Powered Content & Brand OS" />
    <meta property="twitter:description" content="Elevate your brand with Brandable. A centralized platform for content strategy, file management, and AI-driven creativity." />
    <meta property="twitter:image" content="https://cdn.dribbble.com/userupload/46470256/file/af6fd035c99fbb7985614c15d3a47d96.jpg?format=webp&resize=640x480&vertical=center" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://cdn.dribbble.com/userupload/46470256/file/af6fd035c99fbb7985614c15d3a47d96.jpg?format=webp&resize=640x480&vertical=center" />
    <link rel="apple-touch-icon" href="https://cdn.dribbble.com/userupload/46470256/file/af6fd035c99fbb7985614c15d3a47d96.jpg?format=webp&resize=640x480&vertical=center" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'system';
          const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          const root = document.documentElement;
          
          if (isDark) {
            root.classList.add('dark');
            root.classList.remove('light');
            root.style.backgroundColor = '#000000';
          } else {
            root.classList.add('light');
            root.classList.remove('dark');
            root.style.backgroundColor = '#f8f9fa';
          }

          // Mobile Status Bar Color Sync
          let metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', isDark ? '#000000' : '#ffffff');
          }

          // Force background-color immediately to avoid flash
          const style = document.createElement('style');
          style.innerHTML = `
            html.dark, html.dark body { background-color: #000000 !important; color: #ffffff; }
            html.light, html.light body { background-color: #f8f9fa !important; color: #0f172a; }
          `;
          document.head.appendChild(style);
        } catch (e) {
          console.error('Theme initialization failed', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
